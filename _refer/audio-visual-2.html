            }
          } else {
            ctx.ellipse(cx, cy, wave.radius * 1.34, wave.radius * 0.74, 0, 0, Math.PI * 2);
          }
          ctx.stroke();
          ctx.restore();
        });
        const coreRad = H * 0.12 + bass * 25;
        const sunGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, coreRad);
        sunGrad.addColorStop(0, "#ffffff");
        sunGrad.addColorStop(0.35, color);
        sunGrad.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = sunGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, coreRad, 0, Math.PI * 2);
        ctx.fill();
        if (variantIndex === 1) {
          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth   = 1.5;
          ctx.beginPath();
          ctx.arc(cx, cy, coreRad * 0.58, 0, Math.PI * 2);
          ctx.stroke();
        }
      } else if (style === "waterfall") {
        ctx.globalCompositeOperation = "source-over";
        const hist = sb.waterfallHistory;
        hist.pop();
        const cols = 64;
        const currentFrame = new Float32Array(cols);
        for (let i = 0; i < cols; i++) currentFrame[i] = data[Math.floor((i / cols) * n)] / 255;
        hist.unshift(currentFrame);
        const rows  = hist.length;
        const cellW = fieldW / cols;
        const startY = cy - H * 0.25;
        const viewH  = H * 0.52;
        const cellH  = viewH / rows;
        if (variantIndex === 0) {
          for (let r = 0; r < rows; r++) {
            const frame = hist[r];
            const y     = startY + r * cellH;
            const alpha = 1.0 - (r / rows);
            for (let c = 0; c < cols; c++) {
              const val = frame[c];
              if (val < 0.05) continue;
              let fillStyle;
              if (val > 0.8)       fillStyle = "#ffffff";
              else if (val > 0.45) fillStyle = "#f97316";
              else if (val > 0.2)  fillStyle = color;
              else                 fillStyle = "color-mix(in srgb, " + color + " 40%, #0c0d10)";
              ctx.fillStyle   = fillStyle;
              ctx.globalAlpha = val * alpha * 0.85;
              ctx.fillRect(x0 + c * cellW, y, cellW + 0.5, cellH + 0.5);
            }
          }
          ctx.globalAlpha = 1;
        } else if (variantIndex === 1) {
          ctx.font      = "bold 9px monospace";
          ctx.textAlign = "center";
          for (let r = 0; r < rows; r += 4) {
            const frame = hist[r];
            const y     = startY + r * cellH;
            const alpha = 1.0 - (r / rows);
            for (let c = 0; c < cols; c += 2) {
              const val = frame[c];
              if (val < 0.2) continue;
              const char = String.fromCharCode(48 + Math.floor(Math.random() * 40));
              ctx.fillStyle   = color;
              ctx.globalAlpha = val * alpha * 0.9;
              ctx.fillText(char, x0 + c * cellW + cellW / 2, y);
            }
          }
          ctx.globalAlpha = 1;
        } else {
          ctx.strokeStyle = color;
          ctx.shadowBlur  = 5;
          ctx.shadowColor = color;
          ctx.lineWidth   = 1;
          for (let r = rows - 1; r >= 0; r -= 3) {
            const frame    = hist[r];
            const y        = startY + r * cellH;
            const progress = r / rows;
            const alpha    = (1.0 - progress) * 0.72;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            for (let c = 0; c < cols; c++) {
              const val = frame[c];
              const h   = val * H * 0.16;
              const px  = x0 + c * cellW;
              const py  = y - h;
              if (c === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.stroke();
            ctx.restore();
          }
          ctx.shadowBlur = 0;
        }
      } else if (style === "laserScanner") {
        ctx.globalCompositeOperation = "lighter";
        ctx.strokeStyle = color;
        ctx.shadowBlur  = 18;
        ctx.shadowColor = color;
        if (variantIndex === 0) {
          const sweepY = cy + Math.sin(t * 1.6) * H * 0.26;
          ctx.lineWidth = 2.2;
          ctx.beginPath();
          ctx.moveTo(x0, sweepY);
          ctx.lineTo(x0 + fieldW, sweepY);
          ctx.stroke();
          ctx.lineWidth   = 1.0;
          ctx.globalAlpha = 0.35;
          const laserCount = 20;
          const laserStep  = fieldW / laserCount;
          for (let i = 0; i <= laserCount; i++) {
            const val = data[Math.floor((i / laserCount) * n)] / 255;
            const lx  = x0 + i * laserStep;
            ctx.beginPath();
            ctx.moveTo(lx, sweepY);
            ctx.lineTo(lx, sweepY + val * H * 0.28);
            ctx.stroke();
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(lx, sweepY + val * H * 0.28, 2.5 + val * 4, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1.0;
        } else if (variantIndex === 1) {
          const targetRad = 20 + bass * 30;
          ctx.lineWidth   = 2;
          ctx.strokeStyle = color;
          ctx.beginPath();
          ctx.arc(cx, cy, targetRad, 0, Math.PI * 2);
          ctx.arc(cx, cy, 6, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(cx - targetRad - 6, cy); ctx.lineTo(cx - targetRad + 3, cy);
          ctx.moveTo(cx + targetRad + 6, cy); ctx.lineTo(cx + targetRad - 3, cy);
          ctx.moveTo(cx, cy - targetRad - 6); ctx.lineTo(cx, cy - targetRad + 3);
          ctx.moveTo(cx, cy + targetRad + 6); ctx.lineTo(cx, cy + targetRad - 3);
          ctx.stroke();
          const beamOffset = mids * 40;
          ctx.lineWidth   = 1.2;
          ctx.globalAlpha = 0.5;
          ctx.beginPath();
          ctx.moveTo(x0, H * 0.16); ctx.lineTo(cx - targetRad - beamOffset, cy);
          ctx.moveTo(x0 + fieldW, H * 0.16); ctx.lineTo(cx + targetRad + beamOffset, cy);
          ctx.moveTo(x0, H * 0.84); ctx.lineTo(cx - targetRad - beamOffset, cy);
          ctx.moveTo(x0 + fieldW, H * 0.84); ctx.lineTo(cx + targetRad + beamOffset, cy);
          ctx.stroke();
          ctx.fillStyle   = color;
          ctx.font        = "10px JetBrains Mono, monospace";
          ctx.fillText("LASER_SCAN: LOCK // BASS=" + bass.toFixed(2), x0, H * 0.12);
          ctx.fillText("FOCUS_X=" + cx + " FOCUS_Y=" + cy, x0 + fieldW - 160, H * 0.12);
          ctx.globalAlpha = 1.0;
        } else {
          const angle = t * 1.2;
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + Math.cos(angle) * H * 0.32, cy + Math.sin(angle) * H * 0.32);
          ctx.stroke();
          ctx.strokeStyle = color;
          ctx.lineWidth   = 1.0;
          ctx.globalAlpha = 0.15;
          ctx.beginPath();
          ctx.arc(cx, cy, H * 0.14, 0, Math.PI * 2);
          ctx.arc(cx, cy, H * 0.23, 0, Math.PI * 2);
          ctx.arc(cx, cy, H * 0.32, 0, Math.PI * 2);
          ctx.stroke();
          const trails = 16;
          for (let s = 0; s < trails; s++) {
            const sa      = angle - s * 0.05;
            const intensity = 1.0 - s / trails;
            const rawVal  = data[Math.floor((s / trails) * n)] / 255;
            const r       = H * (0.05 + rawVal * 0.28);
            ctx.strokeStyle = color;
            ctx.globalAlpha = intensity * 0.35;
            ctx.lineWidth   = 1.2;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(sa) * r, cy + Math.sin(sa) * r);
            ctx.stroke();
          }
          ctx.globalAlpha = 1.0;
        }
      } else if (style === "fluidSphere") {
        ctx.globalCompositeOperation = "lighter";
        const points      = 36;
        const baseRadius  = H * (variantIndex === 2 ? 0.18 : 0.21);
        const maxExpansion = H * 0.12;
        const ptCoords    = [];
        for (let i = 0; i < points; i++) {
          const ang     = (i / points) * Math.PI * 2;
          const bandVal = data[Math.floor((i / points) * n)] / 255;
          sb.fluidSphere[i] += (bandVal - sb.fluidSphere[i]) * 0.2;
          const val    = sb.fluidSphere[i];
          const wobble = Math.sin(t * 4.2 + i * 0.5) * 10 * (bass + 0.15);
          const r      = baseRadius + val * maxExpansion + wobble;
          ptCoords.push({ x: cx + Math.cos(ang) * r, y: cy + Math.sin(ang) * r });
        }
        ctx.save();
        ctx.shadowBlur  = 20;
        ctx.shadowColor = color;
        const gradX    = cx - baseRadius * 0.2;
        const gradY    = cy - baseRadius * 0.2;
        const blobGrad = ctx.createRadialGradient(gradX, gradY, 10, cx, cy, baseRadius * 1.4);
        if (variantIndex === 0) {
          blobGrad.addColorStop(0, "#fef08a");
          blobGrad.addColorStop(0.35, "#f97316");
          blobGrad.addColorStop(0.8, color);
          blobGrad.addColorStop(1, "#0c0d10");
        } else if (variantIndex === 1) {
          blobGrad.addColorStop(0, "#ffffff");
          blobGrad.addColorStop(0.2, "#e2e8f0");
          blobGrad.addColorStop(0.65, "#94a3b8");
          blobGrad.addColorStop(1, "#1e293b");
        } else {
          blobGrad.addColorStop(0, "#ffffff");
          blobGrad.addColorStop(0.3, "#818cf8");
          blobGrad.addColorStop(0.75, color);
          blobGrad.addColorStop(1, "#1e1b4b");
        }
        ctx.fillStyle = blobGrad;
        drawCurve(ctx, ptCoords);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth   = 2.0;
        ctx.stroke();
        if (variantIndex === 1 || variantIndex === 2) {
          ctx.fillStyle  = color;
          ctx.shadowBlur = 8;
          for (let d = 0; d < 6; d++) {
            const da   = t * 1.0 + d * (Math.PI / 3);
            const dist = baseRadius * 1.4 + Math.sin(t + d) * 14 + bass * 20;
            const dx   = cx + Math.cos(da) * dist;
            const dy   = cy + Math.sin(da) * dist;
            const ds   = 3.5 + (data[(d * 6) % n] / 255) * 7;
            ctx.beginPath();
            ctx.arc(dx, dy, ds, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();
      } else if (style === "waveTunnel") {
        ctx.globalCompositeOperation = "lighter";
        const rings = 10;
        const phase = (t * 0.6) % 1.0;
        ctx.strokeStyle = color;
        ctx.shadowBlur  = 12;
        ctx.shadowColor = color;
        for (let r = 0; r < rings; r++) {
          const ringProgress = (r + phase) / rings;
          const ringScale    = Math.pow(ringProgress, 2.0);
          const maxR         = H * 0.6;
          const radius       = ringScale * maxR;
          if (radius < 4) continue;
          let ringAlpha = ringProgress < 0.2 ? ringProgress * 5 : 1.0;
          if (ringProgress > 0.72) ringAlpha = (1.0 - ringProgress) / 0.28;
          ctx.save();
          ctx.globalAlpha = ringAlpha * 0.68;
          ctx.lineWidth   = 1.0 + ringProgress * 3.0;
          const vertices = variantIndex === 1 ? 6 : (variantIndex === 2 ? 4 : 20);
          const pts      = [];
          for (let v = 0; v <= vertices; v++) {
            const ang      = (v / vertices) * Math.PI * 2 + (variantIndex === 1 ? -t * 0.1 : t * 0.12);
            const dataVal  = data[Math.floor((v / vertices) * n)] / 255;
            const displacement = dataVal * 28 * bass * ringProgress;
            const dist     = radius + displacement;
            pts.push({ x: cx + Math.cos(ang) * dist * 1.34, y: cy + Math.sin(ang) * dist * 0.76 });
          }
          ctx.beginPath();
          pts.forEach((p, idx) => { if (idx === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
          ctx.closePath();
          ctx.stroke();
          ctx.restore();
        }
      } else if (style === "barcodeMeter") {
        ctx.globalCompositeOperation = "lighter";
        const numLines = 48;
        const colW     = fieldW / numLines;
        const startY   = cy - H * 0.24;
        const barH     = H * 0.48;
        const scanPos  = startY + (Math.sin(t * 2.0) * 0.5 + 0.5) * barH;
        for (let i = 0; i < numLines; i++) {
          const rawVal  = data[Math.floor((i / numLines) * n)] / 255;
          sb.barcodeMeter[i] += (rawVal - sb.barcodeMeter[i]) * 0.2;
          const val     = sb.barcodeMeter[i];
          const stripeW = colW * (i % 3 === 0 ? 0.35 : (i % 2 === 0 ? 0.65 : 0.85));
          const x       = x0 + i * colW + (colW - stripeW) / 2;
          ctx.fillStyle   = color;
          ctx.globalAlpha = 0.05;
          ctx.fillRect(x, startY, stripeW, barH);
          if (variantIndex === 0) {
            const currentH = val * barH;
            ctx.globalAlpha = 0.15 + val * 0.75;
            ctx.fillRect(x, startY + (barH - currentH) / 2, stripeW, currentH);
          } else if (variantIndex === 1) {
            ctx.globalAlpha = 0.08 + val * 0.86;
            ctx.fillRect(x, startY, stripeW, barH);
          } else {
            const pulseH = val * barH * 0.5;
            ctx.globalAlpha = 0.18 + val * 0.8;
            ctx.fillRect(x, cy - pulseH, stripeW, pulseH * 2);
          }
          if (scanPos >= startY && scanPos <= startY + barH) {
            ctx.save();
            ctx.shadowBlur  = 8;
            ctx.shadowColor = "#ef4444";
            ctx.fillStyle   = "#ef4444";
            ctx.globalAlpha = 0.6 + val * 0.4;
            ctx.fillRect(x, scanPos - 1.5, stripeW, 3);
            ctx.restore();
          }
        }
        ctx.strokeStyle = "#ef4444";
        ctx.lineWidth   = 1.8;
        ctx.shadowBlur  = 12;
        ctx.shadowColor = "#ef4444";
        ctx.beginPath();
        ctx.moveTo(x0, scanPos);
        ctx.lineTo(x0 + fieldW, scanPos);
        ctx.stroke();
        ctx.shadowBlur  = 0;
        ctx.fillStyle   = color;
        ctx.font        = "9px JetBrains Mono, monospace";
        ctx.globalAlpha = 0.7;
        ctx.fillText("SYS_DECODE: ACTIVE", x0, startY - 12);
        ctx.fillText("BPM_LOCK: OK", x0 + fieldW - 80, startY - 12);
        ctx.globalAlpha = 1.0;

      /* ── 26. DNA Helix ─────────────────────────────── */
      } else if (style === "dnaHelix") {
        const segments = 64;
        const helixH   = H * 0.72;
        const helixY0  = cy - helixH * 0.5;
        const spread   = W * (variantIndex === 1 ? 0.09 : 0.07);
        const twistSpd = variantIndex === 1 ? 1.8 : (variantIndex === 2 ? 0.6 : 1.2);
        ctx.globalCompositeOperation = "lighter";
        ctx.shadowBlur  = 14;
        ctx.shadowColor = color;
        for (let i = 0; i < segments; i++) {
          const rv = data[Math.floor((i / segments) * n)] / 255;
          sb.dnaHelix[i] += (rv - sb.dnaHelix[i]) * 0.18;
        }
        for (let strand = 0; strand < 2; strand++) {
          const off = strand * Math.PI;
          const pts = [];
          for (let i = 0; i <= segments; i++) {
            const frac = i / segments;
            const val  = sb.dnaHelix[Math.min(i, segments - 1)];
            const y    = helixY0 + frac * helixH;
            const ph   = frac * Math.PI * 5 + t * twistSpd + off;
            pts.push({ x: cx + Math.cos(ph) * spread * (1 + val * 0.5), y });
          }
          ctx.strokeStyle = (variantIndex === 2 && strand === 1) ? "#ffffff" : color;
          ctx.lineWidth   = variantIndex === 2 ? 1.5 : 3;
          ctx.globalAlpha = 0.9;
          drawCurve(ctx, pts);
          ctx.stroke();
        }
        const rungCount = variantIndex === 2 ? 10 : 18;
        for (let r = 0; r < rungCount; r++) {
          const frac = r / rungCount;
          const val  = sb.dnaHelix[Math.floor(frac * segments)];
          const y    = helixY0 + frac * helixH;
          const ph   = frac * Math.PI * 5 + t * twistSpd;
          const rr   = spread * (1 + val * 0.5);
          const x1   = cx + Math.cos(ph) * rr;
          const x2   = cx + Math.cos(ph + Math.PI) * rr;
          ctx.globalAlpha = 0.28 + val * 0.55;
          ctx.lineWidth   = 1.2 + val * 2;
          ctx.shadowBlur  = 6 + val * 12;
          ctx.strokeStyle = color;
          ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
          ctx.fillStyle   = "#ffffff";
          ctx.globalAlpha = 0.55 + val * 0.35;
          ctx.shadowBlur  = 10;
          [x1, x2].forEach(px => {
            ctx.beginPath(); ctx.arc(px, y, 2 + val * 4, 0, Math.PI * 2); ctx.fill();
          });
        }

      /* ── 27. Aurora ────────────────────────────────── */
      } else if (style === "aurora") {
        ctx.globalCompositeOperation = "lighter";
        const bandCount = 8;
        for (let b = 0; b < bandCount; b++) {
          const frac   = b / bandCount;
          const rv     = data[Math.floor(frac * n * 0.55)] / 255;
          sb.aurora[b] += (rv - sb.aurora[b]) * (rv > sb.aurora[b] ? 0.2 : 0.06);
          const val = sb.aurora[b];
          if (val < 0.015) continue;
          const baseY = H * 0.08 + b * (H * 0.55 / bandCount);
          const pts   = [];
          for (let s = 0; s <= 48; s++) {
            const sx  = (s / 48) * W;
            const ph  = t * (0.35 + b * 0.12) + s * 0.18;
            const wv  = Math.sin(ph) * val * H * 0.16
                      + Math.sin(ph * 2.1 + 1.1) * val * H * 0.07;
            pts.push({ x: sx, y: baseY + wv });
          }
          const hue = variantIndex === 0 ? 150 + b * 12 + val * 25
                    : variantIndex === 1 ? 260 + b * 18 + val * 35
                    : 180 + b * 15 + Math.sin(t * 0.6 + b) * 25;
          const bc = `hsl(${hue},90%,62%)`;
          ctx.save();
          ctx.shadowBlur  = 14; ctx.shadowColor = bc;
          ctx.strokeStyle = bc;
          ctx.lineWidth   = 2 + val * 3.5;
          ctx.globalAlpha = 0.5 + val * 0.5;
          drawCurve(ctx, pts); ctx.stroke();
          const grad = ctx.createLinearGradient(0, baseY - H * 0.12, 0, baseY + H * 0.22);
          grad.addColorStop(0, `hsla(${hue},90%,65%,${val * 0.45})`);
          grad.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = grad; ctx.globalAlpha = 0.5;
          drawCurve(ctx, pts);
          ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
          ctx.restore();
        }

      /* ── 28. Kaleidoscope ──────────────────────────── */
      } else if (style === "kaleidoscope") {
        const segs      = variantIndex === 0 ? 6 : variantIndex === 1 ? 8 : 12;
        const angStep   = (Math.PI * 2) / segs;
        const maxR      = Math.min(cx, cy) * 0.88;
        ctx.globalCompositeOperation = "lighter";
        for (let i = 0; i < 64; i++) {
          const rv = data[Math.floor((i / 64) * n)] / 255;
          sb.kaleidoscope[i] += (rv - sb.kaleidoscope[i]) * 0.2;
        }
        for (let seg = 0; seg < segs; seg++) {
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(seg * angStep + t * (0.08 + bass * 0.08));
          for (let r = 0; r < 32; r++) {
            const frac    = r / 32;
            const val     = sb.kaleidoscope[Math.floor(frac * 64)];
            const rStart  = frac * maxR * 0.15;
            const rLen    = (maxR / 32) * (0.6 + val * 1.8);
            const angW    = angStep * 0.45;
            ctx.fillStyle   = color;
            ctx.shadowBlur  = 6 + val * 14;
            ctx.shadowColor = color;
            ctx.globalAlpha = 0.08 + val * 0.68;
            ctx.beginPath();
            ctx.arc(0, 0, rStart + rLen, -angW / 2, angW / 2);
            ctx.arc(0, 0, rStart, angW / 2, -angW / 2, true);
            ctx.closePath(); ctx.fill();
          }
          ctx.restore();
        }

      /* ── 29. Star Warp ─────────────────────────────── */
      } else if (style === "starWarp") {
        if (sb.starWarp.length === 0) {
          for (let i = 0; i < 200; i++) {
            sb.starWarp.push({ x: (Math.random() - 0.5) * 2, y: (Math.random() - 0.5) * 2, z: Math.random(), pz: 0 });
          }
        }
        const spd = 0.005 + bass * 0.025 + highs * 0.006;
        ctx.globalCompositeOperation = "lighter";
        sb.starWarp.forEach((star) => {
          star.pz = star.z;
          star.z -= spd;
          if (star.z <= 0) { star.x = (Math.random() - 0.5) * 2; star.y = (Math.random() - 0.5) * 2; star.z = 1; star.pz = 1; }
          const sx = (star.x / star.z) * cx + cx;
          const sy = (star.y / star.z) * cy + cy;
          const px = (star.x / star.pz) * cx + cx;
          const py = (star.y / star.pz) * cy + cy;
          if (sx < 0 || sx > W || sy < 0 || sy > H) return;
          const size  = (1 - star.z) * 3.5;
          const alpha = 0.35 + (1 - star.z) * 0.65;
          ctx.fillStyle   = color;
          ctx.strokeStyle = color;
          ctx.globalAlpha = alpha;
          ctx.shadowBlur  = size * 3;
          ctx.shadowColor = color;
          if (variantIndex === 0 && star.pz < 0.98) {
            ctx.lineWidth = Math.max(0.5, size * 0.55);
            ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy); ctx.stroke();
          } else {
            ctx.beginPath(); ctx.arc(sx, sy, Math.max(0.5, size), 0, Math.PI * 2); ctx.fill();
          }
          if (variantIndex === 2) {
            ctx.globalAlpha = alpha * 0.1; ctx.shadowBlur = 0;
            ctx.beginPath(); ctx.arc(sx, sy, size * 6 + bass * 8, 0, Math.PI * 2); ctx.fill();
          }
        });

      /* ── 30. Magnet Field ──────────────────────────── */
      } else if (style === "magnetField") {
        ctx.globalCompositeOperation = "lighter";
        const p1x = cx - W * 0.2, p2x = cx + W * 0.2;
        for (let i = 0; i < 32; i++) {
          const rv = data[Math.floor((i / 32) * n)] / 255;
          sb.magnetField[i] += (rv - sb.magnetField[i]) * 0.18;
        }
        if (variantIndex === 1) {
          for (let l = 0; l < 20; l++) {
            const val = sb.magnetField[l % 32];
            const ang = (l / 20) * Math.PI * 2 + t * 0.15;
            const len = H * (0.08 + val * 0.3);
            ctx.strokeStyle = color; ctx.lineWidth = 0.8 + val * 2.5;
            ctx.globalAlpha = 0.12 + val * 0.55; ctx.shadowBlur = 8 + val * 12; ctx.shadowColor = color;
            ctx.beginPath(); ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(ang) * len, cy + Math.sin(ang) * len); ctx.stroke();
          }
        } else {
          const lineCount = variantIndex === 2 ? 20 : 16;
          for (let l = 0; l < lineCount; l++) {
            const val   = sb.magnetField[l % 32];
            const angle = (l / lineCount - 0.5) * Math.PI * 1.5;
            const midY  = cy + Math.sin(angle) * H * 0.4 * (1 + val * 0.4);
            ctx.strokeStyle = color; ctx.lineWidth = 0.8 + val * 2;
            ctx.globalAlpha = 0.12 + val * 0.5; ctx.shadowBlur = 7 + val * 10; ctx.shadowColor = color;
            ctx.beginPath(); ctx.moveTo(p1x, cy);
            ctx.quadraticCurveTo((p1x + p2x) * 0.5, midY, p2x, cy); ctx.stroke();
          }
          [p1x, p2x].forEach((px, pi) => {
            const pv = pi === 0 ? bass : mids;
            const r  = 18 + pv * 22;
            const g  = ctx.createRadialGradient(px, cy, 2, px, cy, r);
            g.addColorStop(0, "#ffffff"); g.addColorStop(0.4, color); g.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = g; ctx.globalAlpha = 0.85; ctx.shadowBlur = 22; ctx.shadowColor = color;
            ctx.beginPath(); ctx.arc(px, cy, r, 0, Math.PI * 2); ctx.fill();
          });
        }

      /* ── 31. Voronoi ───────────────────────────────── */
      } else if (style === "voronoi") {
        const cells = sb.voronoiCells;
        ctx.globalCompositeOperation = "lighter";
        cells.forEach((cell, i) => {
          const rv = data[(i * 6 + 2) % n] / 255;
          cell.val += (rv - cell.val) * 0.14;
          cell.px = ((cell.px + cell.vx * (1 + mids)) + 1) % 1;
          cell.py = ((cell.py + cell.vy * (1 + mids)) + 1) % 1;
        });
        const pos = cells.map(c => ({ x: c.px * W, y: c.py * H, val: c.val }));
        ctx.shadowBlur = 8; ctx.shadowColor = color;
        for (let a = 0; a < pos.length; a++) {
          for (let b = a + 1; b < pos.length; b++) {
            const d = Math.hypot(pos[a].x - pos[b].x, pos[a].y - pos[b].y);
            if (d < W * 0.28) {
              const str = 1 - d / (W * 0.28);
              const val = (pos[a].val + pos[b].val) * 0.5;
              ctx.globalAlpha = str * (0.06 + val * 0.42);
              ctx.strokeStyle = color; ctx.lineWidth = 0.7 + val * 1.8;
              ctx.beginPath(); ctx.moveTo(pos[a].x, pos[a].y); ctx.lineTo(pos[b].x, pos[b].y); ctx.stroke();
            }
          }
        }
        pos.forEach(({ x, y, val }) => {
          const r = variantIndex === 1 ? 8 + val * 28 : 3.5 + val * 13;
          ctx.fillStyle = color; ctx.shadowBlur = 14 + val * 18; ctx.shadowColor = color;
          ctx.globalAlpha = 0.4 + val * 0.6;
          ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
          if (variantIndex === 2) {
            ctx.strokeStyle = color; ctx.lineWidth = 1;
            ctx.globalAlpha = 0.18 + val * 0.4; ctx.shadowBlur = 4;
            ctx.beginPath();
            for (let k = 0; k < 6; k++) {
              const a = (k / 6) * Math.PI * 2 + t * 0.08;
              const pr = 24 + val * 48;
              if (k === 0) ctx.moveTo(x + Math.cos(a) * pr, y + Math.sin(a) * pr);
              else ctx.lineTo(x + Math.cos(a) * pr, y + Math.sin(a) * pr);
            }
            ctx.closePath(); ctx.stroke();
          }
          if (variantIndex === 0) {
            ctx.strokeStyle = color; ctx.lineWidth = 1;
            ctx.globalAlpha = 0.14 + val * 0.28; ctx.shadowBlur = 5;
            ctx.beginPath(); ctx.arc(x, y, r + 8 + val * 22, 0, Math.PI * 2); ctx.stroke();
          }
        });

      /* ── 32. Oscilloscope ──────────────────────────── */
      } else if (style === "oscilloscope") {
        ctx.globalCompositeOperation = "lighter";
        const pts = 128;
        for (let i = 0; i < pts; i++) {
          const bv  = data[Math.floor((i / pts) * n)] / 255;
          const osc = Math.sin(i * 0.26 + t * 8) * bv + Math.sin(i * 0.13 + t * 5.2) * bv * 0.5;
          sb.oscilloscope[i] += (osc - sb.oscilloscope[i]) * 0.3;
        }
        if (variantIndex === 1) {
          ctx.strokeStyle = color; ctx.shadowBlur = 12; ctx.shadowColor = color;
          ctx.lineWidth = 1.5; ctx.globalAlpha = 0.8;
          ctx.beginPath();
          const R = H * 0.3;
          for (let i = 0; i < pts; i++) {
            const x = cx + sb.oscilloscope[i] * R;
            const y = cy + sb.oscilloscope[(i + 32) % pts] * R;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.stroke();
        } else {
          const wc = variantIndex === 0 ? "#00ff88" : color;
          ctx.strokeStyle = wc; ctx.lineWidth = 0.6; ctx.globalAlpha = 0.07; ctx.shadowBlur = 0;
          for (let gx = 0; gx <= 10; gx++) {
            ctx.beginPath(); ctx.moveTo(x0 + gx * (fieldW / 10), H * 0.18);
            ctx.lineTo(x0 + gx * (fieldW / 10), H * 0.82); ctx.stroke();
          }
          for (let gy = 0; gy <= 6; gy++) {
            ctx.beginPath(); ctx.moveTo(x0, H * 0.18 + gy * (H * 0.64 / 6));
            ctx.lineTo(x0 + fieldW, H * 0.18 + gy * (H * 0.64 / 6)); ctx.stroke();
          }
          ctx.strokeStyle = wc; ctx.lineWidth = 2.5; ctx.globalAlpha = 0.9;
          ctx.shadowBlur = 16; ctx.shadowColor = wc;
          ctx.beginPath();
          for (let i = 0; i < pts; i++) {
            const x = x0 + (i / (pts - 1)) * fieldW;
            const y = cy + sb.oscilloscope[i] * H * 0.3;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.stroke();
          if (variantIndex === 2) {
            ctx.strokeStyle = "#ff8c00"; ctx.shadowColor = "#ff8c00";
            ctx.globalAlpha = 0.6; ctx.lineWidth = 1.8;
            ctx.beginPath();
            for (let i = 0; i < pts; i++) {
              const x = x0 + (i / (pts - 1)) * fieldW;
              const y = cy - sb.oscilloscope[(i + 32) % pts] * H * 0.28;
              if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
          }
        }

      /* ── 33. Neural Net ────────────────────────────── */
      } else if (style === "neuralNet") {
        ctx.globalCompositeOperation = "lighter";
        const topo   = variantIndex === 1 ? [3, 5, 3] : [4, 8, 8, 4];
        const lxs    = topo.map((_, li) => x0 + (li / (topo.length - 1)) * fieldW);
        const nodes  = [];
        topo.forEach((count, li) => {
          for (let ni = 0; ni < count; ni++) {
            const dIdx = ((li * 8 + ni * 3) * 7) % n;
            const rv   = data[dIdx] / 255;
            const nIdx = nodes.length;
            sb.neuralActivity[nIdx] += (rv - sb.neuralActivity[nIdx]) * 0.22;
            nodes.push({ x: lxs[li], y: cy + (ni - (count - 1) * 0.5) * H * 0.13, val: sb.neuralActivity[nIdx], li });
          }
        });
        let offset = 0;
        for (let li = 0; li < topo.length - 1; li++) {
          const aS = offset, bS = offset + topo[li];
          for (let a = 0; a < topo[li]; a++) {
            for (let b = 0; b < topo[li + 1]; b++) {
              const nA = nodes[aS + a], nB = nodes[bS + b];
              const val = (nA.val + nB.val) * 0.5;
              ctx.strokeStyle = color; ctx.lineWidth = 0.5 + val * 2.5;
              ctx.globalAlpha = 0.04 + val * 0.5; ctx.shadowBlur = val * 10; ctx.shadowColor = color;
              ctx.beginPath(); ctx.moveTo(nA.x, nA.y); ctx.lineTo(nB.x, nB.y); ctx.stroke();
            }
          }
          offset += topo[li];
        }
        nodes.forEach((node) => {
          const r = 4 + node.val * 14;
          const g = ctx.createRadialGradient(node.x, node.y, 1, node.x, node.y, r);
          g.addColorStop(0, "#ffffff"); g.addColorStop(0.5, color); g.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = g; ctx.globalAlpha = 0.5 + node.val * 0.5;
          ctx.shadowBlur = 14 + node.val * 20; ctx.shadowColor = color;
          ctx.beginPath(); ctx.arc(node.x, node.y, r, 0, Math.PI * 2); ctx.fill();
          if (variantIndex === 2) {
            ctx.strokeStyle = color; ctx.lineWidth = 1;
            ctx.globalAlpha = node.val * 0.35; ctx.shadowBlur = 6;
            ctx.beginPath(); ctx.arc(node.x, node.y, r + 8 + node.val * 14, 0, Math.PI * 2); ctx.stroke();
          }
        });

      /* ── 34. Galaxy Spiral ─────────────────────────── */
      } else if (style === "galaxySpiral") {
        ctx.globalCompositeOperation = "lighter";
        const arms        = variantIndex === 2 ? 3 : 2;
        const starsPerArm = 88;
        const rotSpd      = 0.12 + bass * 0.22;

        for (let arm = 0; arm < arms; arm++) {
          const armOff = (arm / arms) * Math.PI * 2;
          for (let s = 0; s < starsPerArm; s++) {
            const frac  = s / starsPerArm;
            const theta = frac * Math.PI * 3.5 + armOff + t * rotSpd;
            const r     = 20 + frac * H * 0.40;
            const dIdx  = Math.floor(frac * n);
            const rv    = data[dIdx] / 255;
            sb.galaxySpiral[s % 48] += (rv - sb.galaxySpiral[s % 48]) * 0.12;
            const val   = sb.galaxySpiral[s % 48];
            const sx    = cx + Math.cos(theta) * r;
            const sy    = cy + Math.sin(theta) * r * 0.66;
            if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;

            const hue     = variantIndex === 1
              ? (arm * 120 + frac * 80 + t * 18) % 360
              : (arm * 180 + frac * 45) % 360;
            const starCol = variantIndex === 0 ? color : `hsl(${hue},88%,68%)`;
            const size    = Math.max(0.5, (1.4 + val * 3.5) * (1 - frac * 0.5));

            ctx.fillStyle   = starCol;
            ctx.shadowBlur  = size * 5 + val * 8;
            ctx.shadowColor = starCol;
            ctx.globalAlpha = 0.15 + val * 0.75 + (1 - frac) * 0.1;
            ctx.beginPath();
            ctx.arc(sx, sy, size, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Galactic core
        const cR   = 16 + bass * 34;
        const cGrd = ctx.createRadialGradient(cx, cy, 1, cx, cy, cR * 2.2);
        cGrd.addColorStop(0, "#ffffff");
        cGrd.addColorStop(0.2, color);
        cGrd.addColorStop(0.6, variantIndex === 1 ? `hsl(${(t * 40) % 360},90%,55%)` : color);
        cGrd.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle   = cGrd;
        ctx.globalAlpha = 0.9;
        ctx.shadowBlur  = 30;
        ctx.shadowColor = color;
        ctx.beginPath();
        ctx.arc(cx, cy, cR * 2.2, 0, Math.PI * 2);
        ctx.fill();

        if (variantIndex === 2) {
          for (let rr = 0; rr < 3; rr++) {
            const nr = H * (0.13 + rr * 0.1) * (1 + bass * 0.18);
            ctx.strokeStyle = color; ctx.lineWidth = 1;
            ctx.globalAlpha = 0.06 + bass * 0.1; ctx.shadowBlur = 14;
            ctx.beginPath();
            ctx.ellipse(cx, cy, nr * 1.4, nr * 0.66, t * 0.04 * (rr + 1), 0, Math.PI * 2);
            ctx.stroke();
          }
        }

      /* ── 35. Ink Drop ──────────────────────────────── */
      } else if (style === "inkDrop") {
        ctx.globalCompositeOperation = "lighter";
        const drops = sb.inkDrops;
        if (bass > 0.52 && Math.random() < 0.25) {
          const idle = drops.find(d => d.alpha <= 0);
          if (idle) {
            idle.x      = variantIndex === 0 ? cx : x0 + 60 + Math.random() * (fieldW - 120);
            idle.y      = variantIndex === 0 ? cy : H * 0.2 + Math.random() * H * 0.6;
            idle.radius = 6;
            idle.alpha  = 1;
            idle.speed  = 2 + bass * 4;
            idle.width  = 1.2 + bass * 3;
            idle.color  = variantIndex === 2
              ? `hsl(${(t * 60 + Math.random() * 60) % 360},90%,65%)`
              : color;
          }
        }
        drops.forEach((drop) => {
          if (drop.alpha <= 0) return;
          drop.radius += drop.speed * (1 + mids * 0.3);
          drop.alpha  -= 0.018;
          ctx.save();
          ctx.globalAlpha = Math.max(0, drop.alpha);
          ctx.strokeStyle = drop.color || color;
          ctx.shadowBlur  = 18; ctx.shadowColor = drop.color || color;
          ctx.lineWidth   = drop.width;
          ctx.beginPath(); ctx.arc(drop.x, drop.y, drop.radius, 0, Math.PI * 2); ctx.stroke();
          if (drop.radius < 90) {
            ctx.globalAlpha = Math.max(0, drop.alpha * 0.4);
            ctx.lineWidth = drop.width * 0.5;
            ctx.beginPath(); ctx.arc(drop.x, drop.y, drop.radius * 0.55, 0, Math.PI * 2); ctx.stroke();
          }
          ctx.restore();
        });
        const cR   = 10 + bass * 28;
        const cGrd = ctx.createRadialGradient(cx, cy, 2, cx, cy, cR);
        cGrd.addColorStop(0, "#ffffff"); cGrd.addColorStop(0.4, color); cGrd.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = cGrd; ctx.globalAlpha = bass * 0.55;
        ctx.shadowBlur = 20; ctx.shadowColor = color;
        ctx.beginPath(); ctx.arc(cx, cy, cR, 0, Math.PI * 2); ctx.fill();
      }

      ctx.restore();
    }

    renderLoop();
  </script>
</body>
</html>
