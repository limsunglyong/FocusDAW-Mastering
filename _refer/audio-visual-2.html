<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaceKeeper Audio Visualization Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0d10;
      --panel: #15171d;
      --line: rgba(255, 255, 255, 0.09);
      --txt: #eef1f7;
      --dim: #8f96a8;
      --danger: #ff4d5e;
      --blue: #5b8cff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at 18% 4%, rgba(45, 212, 191, 0.12), transparent 30%),
        radial-gradient(circle at 88% 8%, rgba(91, 140, 255, 0.11), transparent 28%),
        var(--bg);
      color: var(--txt);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      gap: 24px;
      align-items: center;
      background: color-mix(in srgb, var(--panel) 92%, black);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 18px 24px;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.22);
    }

    h1 {
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 800;
      line-height: 1.08;
    }

    .brand p {
      margin-top: 6px;
      color: var(--dim);
      font-size: 13px;
      line-height: 1.5;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      min-width: min(540px, 100%);
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }

    .file-label, button {
      min-height: 38px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      font: 700 12px/1 Inter, system-ui, sans-serif;
      color: white;
      cursor: pointer;
      transition: transform 0.14s ease, filter 0.14s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    button:hover, .file-label:hover { filter: brightness(1.1); transform: translateY(-1px); }
    button:active, .file-label:active { transform: translateY(0); }

    .file-label { background: #242833; border: 1px solid var(--line); }
    .btn-primary { background: var(--danger); box-shadow: 0 8px 24px rgba(255, 77, 94, 0.22); }
    .btn-secondary { background: var(--blue); box-shadow: 0 8px 24px rgba(91, 140, 255, 0.22); }
    .btn-ghost { background: #252934; border: 1px solid var(--line); color: var(--txt); }
    input[type="file"] { display: none; }

    .color-picker {
      display: flex;
      gap: 6px;
      min-height: 38px;
      align-items: center;
      background: rgba(0, 0, 0, 0.24);
      padding: 6px;
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 5px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .swatch:hover { transform: scale(1.12); }

    .swatch.active {
      border-color: white;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.42);
    }

    .swatch-custom {
      background: conic-gradient(red 0deg, #ff0 60deg, lime 120deg, cyan 180deg, blue 240deg, magenta 300deg, red 360deg);
      overflow: hidden;
      position: relative;
      padding: 0;
      cursor: pointer;
    }
    .swatch-custom::after {
      content: "+";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
      pointer-events: none;
    }
    .swatch-custom.active::after { content: ""; }
    .swatch-custom input[type="color"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border: none;
      padding: 0;
    }

    .status {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      color: var(--dim);
      font-size: 11px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
    }

    .badge {
      color: var(--txt);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      white-space: nowrap;
    }

    .now-playing {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }

    audio {
      width: 100%;
      height: 36px;
      filter: invert(1) hue-rotate(180deg);
      opacity: 0.82;
    }

    /* ── Main 2-column layout ────────────────────────── */
    main {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 16px;
    }

    /* ── Left: Visualizer panel ──────────────────────── */
    .vis-panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: color-mix(in srgb, var(--panel) 94%, black);
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .stage-card {
      flex: 1;
      min-height: 0;
    }

    .card-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .card-desc {
      margin-top: 3px;
      font-size: 11px;
      color: var(--dim);
      line-height: 1.4;
    }

    .card-code {
      color: var(--dim);
      font-size: 10px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      white-space: nowrap;
    }

    .variant-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      flex-shrink: 0;
    }

    .variant-btn {
      min-height: 30px;
      border-radius: 6px;
      padding: 0 10px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid transparent;
      color: var(--dim);
      font-size: 11px;
      box-shadow: none;
    }

    .variant-btn.active {
      color: var(--txt);
      border-color: color-mix(in srgb, var(--variant-color, #2dd4bf) 60%, white);
      background: color-mix(in srgb, var(--variant-color, #2dd4bf) 16%, rgba(255, 255, 255, 0.055));
    }

    .canvas-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #05060a;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Right: Effects sidebar ──────────────────────── */
    .effects-sidebar {
      display: flex;
      flex-direction: column;
      background: color-mix(in srgb, var(--panel) 94%, black);
      border-radius: 10px;
      border: 1px solid var(--line);
      overflow: hidden;
      min-height: 0;
    }

    .sidebar-header {
      flex-shrink: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--txt);
    }

    .sidebar-count {
      font-size: 10px;
      font-family: "JetBrains Mono", monospace;
      color: var(--dim);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
    }

    .effect-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .effect-list::-webkit-scrollbar { width: 3px; }
    .effect-list::-webkit-scrollbar-track { background: transparent; }
    .effect-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.14);
      border-radius: 2px;
    }

    .effect-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      border-left: 3px solid transparent;
      color: var(--txt);
      cursor: pointer;
      transition: background 0.1s, border-left-color 0.15s;
      min-height: 0;
      font-family: Inter, system-ui, sans-serif;
    }

    .effect-item:hover {
      background: rgba(255, 255, 255, 0.04);
      filter: none;
      transform: none;
    }

    .effect-item.active {
      background: color-mix(in srgb, var(--effect-color, #2dd4bf) 10%, transparent);
      border-left-color: var(--effect-color, #2dd4bf);
    }

    .effect-num {
      font-size: 9px;
      font-family: "JetBrains Mono", monospace;
      color: var(--dim);
      width: 18px;
      text-align: right;
      flex-shrink: 0;
      line-height: 1;
    }

    .effect-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px currentColor;
    }

    .effect-info {
      flex: 1;
      min-width: 0;
    }

    .effect-info b {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--txt);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .effect-info span {
      display: block;
      font-size: 10px;
      color: var(--dim);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 1024px) {
      main {
        grid-template-columns: 1fr 260px;
      }
    }

    @media (max-width: 768px) {
      body { height: auto; overflow: auto; padding: 14px; }
      header { grid-template-columns: 1fr; }
      .toolbar-row, .status { justify-content: flex-start; }
      .toolbar { min-width: 0; }
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }
      .effects-sidebar {
        max-height: 320px;
      }
      .canvas-wrap {
        aspect-ratio: 16 / 9;
        flex: none;
      }
    }

    @media (max-width: 520px) {
      .file-label, button { width: 100%; }
      .color-picker { width: 100%; justify-content: center; }
      .status { flex-direction: column; }
      .now-playing { max-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ── TOP: Controls ───────────────────────────────── -->
  <header>
    <div class="brand">
      <h1>Audio Visualization Gallery</h1>
      <p>35 audio visualization effects — select an effect from the list on the right.</p>
    </div>

    <div class="toolbar">
      <div class="toolbar-row">
        <label class="file-label" for="audio-file">Choose Audio File</label>
        <input id="audio-file" type="file" accept="audio/*">
        <button class="btn-primary" id="btn-demo">Demo Start</button>
        <button class="btn-secondary" id="btn-mic">Use Live Mic</button>
        <button class="btn-ghost" id="btn-stop">Stop</button>
      </div>
      <div class="toolbar-row">
        <div class="color-picker" aria-label="Visualizer color">
          <div class="swatch active" style="background:#2dd4bf;" data-color="#2dd4bf" title="Mint"></div>
          <div class="swatch" style="background:#ff4d5e;" data-color="#ff4d5e" title="Red"></div>
          <div class="swatch" style="background:#a78bfa;" data-color="#a78bfa" title="Violet"></div>
          <div class="swatch" style="background:#ffb020;" data-color="#ffb020" title="Amber"></div>
          <div class="swatch" style="background:#5b8cff;" data-color="#5b8cff" title="Blue"></div>
          <div class="swatch" style="background:#ffffff;" data-color="#ffffff" title="White"></div>
          <label class="swatch swatch-custom" id="custom-swatch" title="Custom RGB Color">
            <input type="color" id="custom-color-input" value="#2dd4bf">
          </label>
        </div>
      </div>
      <div class="status">
        <span class="badge" id="effects-badge">Effects: 25</span>
        <span class="badge now-playing" id="source-status">Source: Idle</span>
      </div>
      <audio id="audio-player" controls></audio>
    </div>
  </header>

  <!-- ── BOTTOM: 2-column layout ─────────────────────── -->
  <main>

    <!-- LEFT: Visualizer canvas -->
    <div class="vis-panel">
      <article class="card stage-card">
        <div class="card-header">
          <div>
            <div class="card-title" id="active-title">1. Bars</div>
            <div class="card-desc" id="active-desc">Neon spectrum bars with reflection</div>
          </div>
          <div class="card-code" id="active-code">bars</div>
        </div>
        <div class="variant-bar" id="variant-menu" aria-label="Visualizer variants"></div>
        <div class="canvas-wrap">
          <canvas id="visual-canvas"></canvas>
        </div>
      </article>
    </div>

    <!-- RIGHT: Effect selection list -->
    <aside class="effects-sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Effects</span>
        <span class="sidebar-count" id="effects-badge-sidebar">25</span>
      </div>
      <div class="effect-list" id="effect-menu" aria-label="Visualizer effect menu"></div>
    </aside>

  </main>

  <script>
    const FFT_SIZE = 256;
    const EFFECTS = [
      { id: "bars",         label: "1. Bars",            color: "#2dd4bf", desc: "Neon spectrum bars with reflection" },
      { id: "mirror",       label: "2. Mirror",          color: "#5b8cff", desc: "Symmetric capsule equalizer" },
      { id: "ribbon",       label: "3. Ribbon",          color: "#a78bfa", desc: "Layered flowing audio ribbons" },
      { id: "blocks",       label: "4. Block Grid",      color: "#ff4d5e", desc: "Beat-reactive tile mosaic" },
      { id: "dots",         label: "5. Dots",            color: "#ffb020", desc: "Spectrum matrix grid" },
      { id: "radial",       label: "6. Radial Bars",     color: "#38bdf8", desc: "Circular frequency spikes" },
      { id: "orbit",        label: "7. Orbit Rings",     color: "#f472b6", desc: "Rotating bass-reactive satellites" },
      { id: "particles",    label: "8. Particles",       color: "#34d399", desc: "Beat-reactive particle burst" },
      { id: "glitch",       label: "9. Glitch Scan",     color: "#facc15", desc: "Horizontal scanline distortion" },
      { id: "honeycomb",    label: "10. Honeycomb",      color: "#fb7185", desc: "Hex cell frequency lattice" },
      { id: "level",        label: "11. Level Meter",    color: "#22c55e", desc: "Fast RMS style level strips" },
      { id: "spectrumLine", label: "12. Spectrum Line",  color: "#f59e0b", desc: "Thin skyline frequency trace" },
      { id: "vinyl",        label: "13. Vinyl Pulse",    color: "#06b6d4", desc: "Record grooves reacting to bass" },
      { id: "rain",         label: "14. Meteor Rain",    color: "#c084fc", desc: "Falling streaks driven by highs" },
      { id: "peak",         label: "15. Peak Hold",      color: "#ef4444", desc: "Stacked meters with peak memory" },
      { id: "retroVU",      label: "16. Retro VU",       color: "#fb923c", desc: "Classic dual needle VU indicators" },
      { id: "plasmaTube",   label: "17. Plasma Tube",    color: "#ec4899", desc: "Glowing gas discharge columns" },
      { id: "haloLED",      label: "18. Halo LED",       color: "#a855f7", desc: "Rotating circular LED dial rings" },
      { id: "iso3D",        label: "19. Iso 3D Grid",    color: "#3b82f6", desc: "3D perspective block columns" },
      { id: "auraWave",     label: "20. Aura Shockwave", color: "#14b8a6", desc: "Concentric circular ripples" },
      { id: "waterfall",    label: "21. Spectral Flow",  color: "#10b981", desc: "Cascading waterfall spectrum history" },
      { id: "laserScanner", label: "22. Laser Scan",     color: "#f43f5e", desc: "High-speed oscillating laser beams" },
      { id: "fluidSphere",  label: "23. Fluid Blob",     color: "#6366f1", desc: "Organic liquid blob morphing" },
      { id: "waveTunnel",   label: "24. Wave Tunnel",    color: "#06b6d4", desc: "Endless perspective tunnels" },
      { id: "barcodeMeter", label: "25. Cyber Barcode",  color: "#84cc16", desc: "Dense code strips reacting to highs" },
      { id: "dnaHelix",     label: "26. DNA Helix",       color: "#00d9ff", desc: "Rotating double helix frequency strands" },
      { id: "aurora",       label: "27. Aurora",           color: "#4ade80", desc: "Northern lights curtain waves" },
      { id: "kaleidoscope", label: "28. Kaleidoscope",     color: "#e879f9", desc: "Symmetrical mandala frequency bloom" },
      { id: "starWarp",     label: "29. Star Warp",        color: "#fbbf24", desc: "Hyperspace starfield warp tunnel" },
      { id: "magnetField",  label: "30. Magnet Field",     color: "#60a5fa", desc: "Magnetic flux lines and poles" },
      { id: "voronoi",      label: "31. Voronoi",          color: "#f472b6", desc: "Crystal cell reactive lattice" },
      { id: "oscilloscope", label: "32. Oscilloscope",     color: "#22d3a8", desc: "CRT phosphor waveform display" },
      { id: "neuralNet",    label: "33. Neural Net",       color: "#a78bfa", desc: "Pulsing AI neural network graph" },
      { id: "galaxySpiral", label: "34. Galaxy Spiral",    color: "#fb923c", desc: "Rotating galactic arms with star particles" },
      { id: "inkDrop",      label: "35. Ink Drop",         color: "#38bdf8", desc: "Expanding ink ripple circles" },
    ];

    const VARIANTS = {
      bars:         ["Reflection", "Center Split", "Dense"],
      mirror:       ["Capsules", "Needles", "Wide"],
      ribbon:       ["Liquid", "Twin Flow", "Wire"],
      blocks:       ["Mosaic", "Pulse Wall", "Sparse"],
      dots:         ["Matrix", "Orbit Dots", "Fine Grid"],
      radial:       ["Spikes", "Halo", "Compass"],
      orbit:        ["Satellites", "Nested", "Comets"],
      particles:    ["Burst", "Swarm", "Spark"],
      glitch:       ["Scanline", "Offset", "Blocks"],
      honeycomb:    ["Hex Outline", "Filled Cells", "Mini Cells"],
      level:        ["Band Meter", "Stereo Bars", "Segment LED"],
      spectrumLine: ["Skyline", "Twin Trace", "Needle Line"],
      vinyl:        ["Grooves", "Turntable", "Radar"],
      rain:         ["Meteor", "Vertical Rain", "Sparks"],
      peak:         ["Classic Bars", "LED Stack", "Horizontal"],
      retroVU:      ["Stereo VU", "Quad VU", "Minimalist"],
      plasmaTube:   ["Liquid Neon", "Electric Arc", "Glow Segment"],
      haloLED:      ["Single Dial", "Nested RGB", "Clockwork"],
      iso3D:        ["Block Grid", "Glass Towers", "City Skyline"],
      auraWave:     ["Pulse Ripple", "Neon Core", "Solar Flare"],
      waterfall:    ["Heatmap Flow", "Glitch Matrix", "Cyberpunk Grid"],
      laserScanner: ["Horizontal Scan", "Crosshair", "Radial Laser"],
      fluidSphere:  ["Molten Lava", "Mercury Drop", "Energy Orb"],
      waveTunnel:   ["Tunnel Portal", "Hex Tunnel", "Vector Wireframe"],
      barcodeMeter: ["Scan Code", "Vertical Matrix", "Pulse Scanner"],
      dnaHelix:     ["Classic Helix", "Fast Twist", "Neon Rungs"],
      aurora:       ["Northern Lights", "Plasma Curtain", "Solar Wind"],
      kaleidoscope: ["6-fold", "8-fold", "12-fold"],
      starWarp:     ["Warp Drive", "Starfield", "Nebula Dust"],
      magnetField:  ["Bipolar", "Radial Flux", "Solar Plasma"],
      voronoi:      ["Crystal Cells", "Bubble Bath", "Mosaic"],
      oscilloscope: ["CRT Mono", "XY Lissajous", "Dual Trace"],
      neuralNet:    ["Deep Network", "Sparse Web", "Brain Pulse"],
      galaxySpiral: ["Twin Arms", "Chromatic", "Nebula Cloud"],
      inkDrop:      ["Ink Pool", "Scatter Drop", "Neon Ripple"],
    };

    const effectMenu   = document.getElementById("effect-menu");
    const variantMenu  = document.getElementById("variant-menu");
    const activeTitle  = document.getElementById("active-title");
    const activeDesc   = document.getElementById("active-desc");
    const activeCode   = document.getElementById("active-code");
    const visualCanvas = document.getElementById("visual-canvas");
    const visualCtx    = visualCanvas.getContext("2d");
    const audioPlayer  = document.getElementById("audio-player");
    const sourceStatus = document.getElementById("source-status");
    const btnDemo      = document.getElementById("btn-demo");
    const btnMic       = document.getElementById("btn-mic");
    const btnStop      = document.getElementById("btn-stop");

    let currentColor    = "#2dd4bf";
    let audioContext    = null;
    let analyser        = null;
    let audioSource     = null;
    let micSource       = null;
    let micStream       = null;
    let demoTimer       = null;
    let isDemoPlaying   = false;
    let isMicActive     = false;
    let currentEffectId = EFFECTS[0].id;
    let currentVariant  = VARIANTS[currentEffectId][0];
    let freqData        = new Uint8Array(FFT_SIZE / 2);

    const smoothBuffer = {
      bars:        new Float32Array(96),
      mirror:      new Float32Array(64),
      ribbon1:     new Float32Array(32),
      ribbon2:     new Float32Array(32),
      matrix:      new Float32Array(48),
      radial:      new Float32Array(96),
      blocks:      new Float32Array(128),
      honeycomb:   new Float32Array(128),
      spectrumLine:new Float32Array(96),
      rain:        new Float32Array(70),
      level:       0,
      vinyl:       0,
      peak:        new Float32Array(32),
      peakHold:    new Float32Array(32),
      bass:        0,
      glitch:      0,
      particles: Array.from({ length: 90 }, (_, i) => ({
        angle:  (i / 90) * Math.PI * 2,
        radius: 26 + (i % 18) * 7,
        speed:  0.45 + (i % 11) * 0.08,
        size:   1.4 + (i % 5) * 0.5,
      })),
      rainDrops: Array.from({ length: 70 }, (_, i) => ({
        x:     (i * 73) % 1000 / 1000,
        y:     (i * 191) % 1000 / 1000,
        len:   16 + (i % 8) * 6,
        speed: 0.006 + (i % 9) * 0.0016,
      })),
      retroVU: {
        left:  { val: 0, vel: 0 },
        right: { val: 0, vel: 0 },
        low:   { val: 0, vel: 0 },
        mid:   { val: 0, vel: 0 },
        high:  { val: 0, vel: 0 },
        rms:   { val: 0, vel: 0 },
      },
      plasmaTube:       new Float32Array(32),
      haloLED:          new Float32Array(64),
      haloPeaks:        new Float32Array(64),
      iso3D:            new Float32Array(64),
      auraWaves:        Array.from({ length: 12 }, () => ({ radius: 0, alpha: 0, width: 2, speed: 2.5, colorShift: 0 })),
      waterfallHistory: Array.from({ length: 100 }, () => new Float32Array(64)),
      laserScanner:     new Float32Array(16),
      fluidSphere:      new Float32Array(36),
      waveTunnel:       new Float32Array(40),
      barcodeMeter:     new Float32Array(60),
      dnaHelix:         new Float32Array(64),
      aurora:           new Float32Array(32),
      kaleidoscope:     new Float32Array(64),
      starWarp:         [],
      magnetField:      new Float32Array(32),
      voronoiCells:     Array.from({ length: 20 }, (_, i) => ({
        px: (i * 0.137 + 0.05) % 1,
        py: (i * 0.231 + 0.08) % 1,
        vx: ((i % 5) - 2) * 0.00045,
        vy: ((i % 3) - 1) * 0.00045,
        val: 0,
      })),
      oscilloscope:     new Float32Array(128),
      neuralActivity:   new Float32Array(32),
      galaxySpiral:     new Float32Array(48),
      inkDrops:         Array.from({ length: 10 }, () => ({ x: 0, y: 0, radius: 0, alpha: 0, speed: 2, width: 2, color: null })),
    };

    visualCanvas.width  = 1280;
    visualCanvas.height = 720;
    document.getElementById("effects-badge").textContent         = `Effects: ${EFFECTS.length}`;
    document.getElementById("effects-badge-sidebar").textContent = EFFECTS.length;

    /* ── Build sidebar effect list ─────────────────── */
    effectMenu.innerHTML = EFFECTS.map((effect, idx) => `
      <button class="effect-item ${effect.id === currentEffectId ? "active" : ""}"
              data-effect="${effect.id}"
              style="--effect-color:${effect.color};">
        <span class="effect-num">${idx + 1}</span>
        <span class="effect-dot" style="background:${effect.color}; color:${effect.color};"></span>
        <div class="effect-info">
          <b>${effect.label.replace(/^\d+\.\s*/, "")}</b>
          <span>${effect.desc}</span>
        </div>
      </button>
    `).join("");

    effectMenu.querySelectorAll(".effect-item").forEach((btn) => {
      btn.addEventListener("click", () => setActiveEffect(btn.dataset.effect));
    });

    function setActiveEffect(effectId) {
      const effect = EFFECTS.find((e) => e.id === effectId) || EFFECTS[0];
      currentEffectId = effect.id;
      currentVariant  = VARIANTS[effect.id][0];
      activeTitle.textContent = effect.label;
      activeTitle.style.color = effect.color;
      activeDesc.textContent  = effect.desc;
      activeCode.textContent  = effect.id;
      effectMenu.querySelectorAll(".effect-item").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.effect === effect.id);
      });
      /* scroll active item into view */
      const activeBtn = effectMenu.querySelector(".effect-item.active");
      if (activeBtn) activeBtn.scrollIntoView({ block: "nearest", behavior: "smooth" });
      visualCtx.fillStyle = "#05060a";
      visualCtx.fillRect(0, 0, visualCanvas.width, visualCanvas.height);
      renderVariantMenu(effect);
    }

    function renderVariantMenu(effect) {
      variantMenu.style.setProperty("--variant-color", effect.color);
      variantMenu.innerHTML = VARIANTS[effect.id].map((v) => `
        <button class="variant-btn ${v === currentVariant ? "active" : ""}" data-variant="${v}">${v}</button>
      `).join("");
      variantMenu.querySelectorAll(".variant-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentVariant = btn.dataset.variant;
          variantMenu.querySelectorAll(".variant-btn").forEach((b) =>
            b.classList.toggle("active", b.dataset.variant === currentVariant)
          );
        });
      });
    }

    setActiveEffect(currentEffectId);

    /* ── Color swatches ────────────────────────────── */
    const customSwatch = document.getElementById("custom-swatch");
    const customInput  = document.getElementById("custom-color-input");

    document.querySelectorAll(".swatch:not(.swatch-custom)").forEach((sw) => {
      sw.addEventListener("click", (e) => {
        document.querySelectorAll(".swatch").forEach((s) => s.classList.remove("active"));
        customSwatch.style.background = "conic-gradient(red 0deg,#ff0 60deg,lime 120deg,cyan 180deg,blue 240deg,magenta 300deg,red 360deg)";
        e.currentTarget.classList.add("active");
        currentColor = e.currentTarget.dataset.color;
      });
    });

    customInput.addEventListener("input", (e) => {
      document.querySelectorAll(".swatch").forEach((s) => s.classList.remove("active"));
      customSwatch.classList.add("active");
      customSwatch.style.background = e.target.value;
      currentColor = e.target.value;
    });

    /* ── Audio file input ──────────────────────────── */
    document.getElementById("audio-file").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      stopDemo(); stopMic(); initAudio(); connectAudioElement();
      audioPlayer.src = URL.createObjectURL(file);
      audioPlayer.play();
      sourceStatus.textContent = `Source: ${file.name}`;
    });

    /* ── Demo ──────────────────────────────────────── */
    btnDemo.addEventListener("click", () => {
      if (isDemoPlaying) { stopDemo(); sourceStatus.textContent = "Source: Idle"; return; }
      stopMic();
      audioPlayer.pause();
      audioPlayer.removeAttribute("src");
      audioPlayer.load();
      isDemoPlaying = true;
      btnDemo.textContent = "Stop Demo";
      sourceStatus.textContent = "Source: Demo Noise";
      simulateNoise();
    });

    /* ── Mic ───────────────────────────────────────── */
    btnMic.addEventListener("click", async () => {
      if (isMicActive) { stopMic(); sourceStatus.textContent = "Source: Idle"; return; }
      try {
        stopDemo(); initAudio(); audioPlayer.pause();
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micSource = audioContext.createMediaStreamSource(micStream);
        micSource.connect(analyser);
        isMicActive = true;
        btnMic.textContent = "Stop Microphone";
        sourceStatus.textContent = "Source: Live Mic";
      } catch {
        alert("Microphone permission was denied or no microphone was found.");
      }
    });

    /* ── Stop ──────────────────────────────────────── */
    btnStop.addEventListener("click", () => {
      stopDemo(); stopMic(); audioPlayer.pause();
      freqData.fill(0);
      sourceStatus.textContent = "Source: Idle";
    });

    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = FFT_SIZE;
        analyser.smoothingTimeConstant = 0.75;
      }
      if (audioContext.state === "suspended") audioContext.resume();
    }

    function connectAudioElement() {
      if (!audioSource) {
        audioSource = audioContext.createMediaElementSource(audioPlayer);
        audioSource.connect(analyser);
        analyser.connect(audioContext.destination);
      }
    }

    function stopDemo() {
      isDemoPlaying = false;
      btnDemo.textContent = "Demo Start";
      if (demoTimer) { clearTimeout(demoTimer); demoTimer = null; }
    }

    function stopMic() {
      isMicActive = false;
      btnMic.textContent = "Use Live Mic";
      if (micSource) { micSource.disconnect(); micSource = null; }
      if (micStream) { micStream.getTracks().forEach((t) => t.stop()); micStream = null; }
    }

    function simulateNoise() {
      if (!isDemoPlaying) return;
      const n = freqData.length;
      const t = performance.now() * 0.003;
      for (let i = 0; i < n; i++) {
        const base      = Math.sin(i * 0.1 - t * 2) * 0.4 + 0.6;
        const kick      = i < 5 ? Math.max(0, Math.sin(t * 4.5)) * 0.72 : 0;
        const snare     = i > 18 && i < 44 ? Math.max(0, Math.sin(t * 9.5 + 1.8)) * 0.25 : 0;
        const highNoise = Math.random() * 0.25 * (i / n);
        freqData[i] = Math.min(1, base + kick + snare + highNoise) * 230;
      }
      demoTimer = setTimeout(simulateNoise, 1000 / 60);
    }

    /* ── Render loop ───────────────────────────────── */
    function renderLoop() {
      requestAnimationFrame(renderLoop);
      if (!isDemoPlaying && isMicActive && analyser) {
        analyser.getByteFrequencyData(freqData);
      } else if (!isDemoPlaying && !audioPlayer.paused && analyser) {
        analyser.getByteFrequencyData(freqData);
      } else if (!isDemoPlaying) {
        for (let i = 0; i < freqData.length; i++) freqData[i] *= 0.86;
      }
      visualCtx.clearRect(0, 0, visualCanvas.width, visualCanvas.height);
      visualCtx.fillStyle = "#05060a";
      visualCtx.fillRect(0, 0, visualCanvas.width, visualCanvas.height);
      drawEngine(visualCtx, visualCanvas.width, visualCanvas.height, freqData, currentEffectId, currentColor, currentVariant);
    }

    /* ── Helpers ───────────────────────────────────── */
    function getAvg(data, from, to) {
      let sum = 0;
      const start = Math.max(0, from);
      const end   = Math.min(data.length, to);
      for (let i = start; i < end; i++) sum += data[i];
      return end > start ? sum / (end - start) / 255 : 0;
    }

    function drawCurve(ctx, points) {
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 0; i < points.length - 1; i++) {
        const mx = (points[i].x + points[i + 1].x) / 2;
        const my = (points[i].y + points[i + 1].y) / 2;
        ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
      }
      ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
    }

    /* ── Draw engine (all 25 effects) ─────────────── */
    function drawEngine(ctx, W, H, data, style, color, variant) {
      ctx.save();
      const cx     = W * 0.5;
      const cy     = H * 0.5;
      const n      = data.length;
      const fieldW = W * 0.85;
      const x0     = cx - fieldW / 2;
      const maxH   = H * 0.35;
      const sb     = smoothBuffer;
      const bass   = getAvg(data, 0, 7);
      const mids   = getAvg(data, 10, 44);
      const highs  = getAvg(data, 48, 110);
      const t      = performance.now() * 0.001;
      const variantIndex = Math.max(0, (VARIANTS[style] || ["Default"]).indexOf(variant));

      if (style === "bars") {
        const bars = variantIndex === 2 ? 84 : 48;
        const bw   = fieldW / bars;
        ctx.shadowBlur = 20;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.globalCompositeOperation = "lighter";
        for (let i = 0; i < bars; i++) {
          const rawVal = data[Math.floor((i / bars) * n)] / 255;
          sb.bars[i] += (rawVal - sb.bars[i]) * (rawVal > sb.bars[i] ? 0.45 : 0.15);
          const h = Math.max(4, sb.bars[i] * maxH * (variantIndex === 2 ? 0.8 : 1));
          const x = x0 + i * bw;
          const y = variantIndex === 1 ? cy : H * 0.75;
          ctx.beginPath();
          ctx.roundRect(x, y - h, bw * 0.68, variantIndex === 1 ? h * 2 : h, variantIndex === 1 ? bw * 0.28 : [6, 6, 0, 0]);
          ctx.fill();
          if (variantIndex === 0) {
            ctx.save();
            ctx.globalAlpha = 0.22;
            ctx.beginPath();
            ctx.roundRect(x, y + 3, bw * 0.68, h * 0.35, [0, 0, 6, 6]);
            ctx.fill();
            ctx.restore();
          }
        }
      } else if (style === "mirror") {
        const bars = variantIndex === 1 ? 64 : 42;
        const bw   = fieldW / bars;
        ctx.shadowBlur = 18;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.globalCompositeOperation = "lighter";
        for (let i = 0; i < bars; i++) {
          const rawVal = data[Math.floor((i / bars) * n)] / 255;
          sb.mirror[i] += (rawVal - sb.mirror[i]) * (rawVal > sb.mirror[i] ? 0.42 : 0.15);
          const h = Math.max(4, sb.mirror[i] * maxH * (variantIndex === 2 ? 0.82 : 0.6));
          const x = x0 + i * bw;
          ctx.beginPath();
          ctx.roundRect(x, cy - h, bw * (variantIndex === 1 ? 0.25 : 0.65), h * 2, bw * 0.32);
          ctx.fill();
        }
      } else if (style === "ribbon") {
        const pts    = variantIndex === 2 ? 30 : 18;
        const points1 = [], points2 = [];
        const drawY  = H * 0.65;
        for (let i = 0; i <= pts; i++) {
          const rawVal = data[Math.floor((i / pts) * n)] / 255;
          sb.ribbon1[i] += (rawVal - sb.ribbon1[i]) * 0.16;
          sb.ribbon2[i] += (rawVal - sb.ribbon2[i]) * 0.08;
          const drift = Math.sin(t * (variantIndex === 1 ? 3.4 : 2) + i * 0.65) * (variantIndex === 2 ? 9 : 20);
          points1.push({ x: x0 + (i / pts) * fieldW, y: drawY - sb.ribbon1[i] * maxH + drift });
          points2.push({ x: x0 + (i / pts) * fieldW, y: drawY - sb.ribbon2[i] * maxH * 0.75 - drift * 0.65 });
        }
        const grad = ctx.createLinearGradient(x0, drawY - maxH, x0, drawY);
        grad.addColorStop(0, color);
        grad.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = grad;
        ctx.globalAlpha = variantIndex === 2 ? 0.08 : 0.25;
        drawCurve(ctx, points2);
        ctx.lineTo(x0 + fieldW, drawY);
        ctx.lineTo(x0, drawY);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = color;
        ctx.lineWidth   = variantIndex === 2 ? 2 : 5;
        ctx.shadowBlur  = 20;
        ctx.shadowColor = color;
        drawCurve(ctx, points1);
        ctx.stroke();
        if (variantIndex === 1) {
          ctx.globalAlpha = 0.55;
          ctx.lineWidth   = 3;
          drawCurve(ctx, points2);
          ctx.stroke();
        }
      } else if (style === "blocks") {
        const cols = variantIndex === 2 ? 22 : 16;
        const rows = variantIndex === 1 ? 7 : 5;
        const gap  = 8;
        const cellW = (fieldW - gap * (cols - 1)) / cols;
        const cellH = H * 0.11;
        const top   = H * 0.22;
        ctx.globalCompositeOperation = "lighter";
        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            const idx    = y * cols + x;
            const rawVal = data[Math.floor((x / cols) * n)] / 255;
            sb.blocks[idx] += (rawVal - sb.blocks[idx]) * 0.18;
            const pulse = sb.blocks[idx] * (1 - y * 0.09);
            ctx.fillStyle  = color;
            ctx.globalAlpha = 0.08 + pulse * 0.86;
            ctx.shadowBlur  = pulse * 18;
            ctx.shadowColor = color;
            ctx.beginPath();
            ctx.roundRect(x0 + x * (cellW + gap), top + y * (cellH + gap), cellW, Math.max(8, cellH * (0.35 + pulse * 0.8)), 6);
            ctx.fill();
          }
        }
      } else if (style === "dots") {
        const cols  = variantIndex === 2 ? 48 : 32;
        const rows  = variantIndex === 2 ? 11 : 8;
        const cw    = fieldW / cols;
        const rh    = (maxH * 1.1) / rows;
        const drawY = H * 0.8;
        for (let x = 0; x < cols; x++) {
          const rawVal = data[Math.floor((x / cols) * n)] / 255;
          sb.matrix[x] += (rawVal - sb.matrix[x]) * 0.18;
          const activeRows = Math.floor(sb.matrix[x] * rows);
          for (let y = 0; y < rows; y++) {
            if (y <= activeRows) {
              ctx.fillStyle   = color;
              ctx.shadowBlur  = 10;
              ctx.shadowColor = color;
              ctx.globalAlpha = 1 - (y / rows) * 0.4;
            } else {
              ctx.fillStyle   = "rgba(255,255,255,0.035)";
              ctx.shadowBlur  = 0;
              ctx.globalAlpha = 1;
            }
            ctx.beginPath();
            const px = variantIndex === 1
              ? cx + Math.cos((x / cols) * Math.PI * 2) * (H * 0.12 + y * rh * 0.9)
              : x0 + x * cw + cw / 2;
            const py = variantIndex === 1
              ? cy + Math.sin((x / cols) * Math.PI * 2) * (H * 0.12 + y * rh * 0.9)
              : drawY - y * rh;
            ctx.arc(px, py, cw * (variantIndex === 2 ? 0.2 : 0.32), 0, Math.PI * 2);
            ctx.fill();
          }
        }
      } else if (style === "radial") {
        const bars = variantIndex === 2 ? 64 : 96;
        const base = H * (variantIndex === 1 ? 0.23 : 0.17);
        ctx.globalCompositeOperation = "lighter";
        ctx.strokeStyle = color;
        ctx.shadowBlur  = 16;
        ctx.shadowColor = color;
        ctx.lineCap     = "round";
        for (let i = 0; i < bars; i++) {
          const rawVal = data[Math.floor((i / bars) * n)] / 255;
          sb.radial[i] += (rawVal - sb.radial[i]) * 0.2;
          const ang = (i / bars) * Math.PI * 2 + t * 0.18;
          const len = 10 + sb.radial[i] * H * (variantIndex === 1 ? 0.06 : 0.16);
          ctx.globalAlpha = 0.32 + sb.radial[i] * 0.68;
          ctx.lineWidth   = variantIndex === 2 ? 4 : 2 + sb.radial[i] * 3;
          ctx.beginPath();
          const inner = variantIndex === 1 ? base - len * 0.5 : base;
          ctx.moveTo(cx + Math.cos(ang) * inner, cy + Math.sin(ang) * inner);
          ctx.lineTo(cx + Math.cos(ang) * (base + len), cy + Math.sin(ang) * (base + len));
          ctx.stroke();
        }
      } else if (style === "orbit") {
        const rings = variantIndex === 1 ? 7 : 4;
        sb.bass += (bass - sb.bass) * 0.16;
        ctx.globalCompositeOperation = "lighter";
        ctx.strokeStyle = color;
        ctx.fillStyle   = color;
        ctx.shadowBlur  = 18;
        ctx.shadowColor = color;
        for (let r = 0; r < rings; r++) {
          const radius = H * (0.12 + r * 0.075) + sb.bass * 34;
          ctx.globalAlpha = 0.18 + r * 0.12;
          ctx.lineWidth   = 2;
          ctx.beginPath();
          ctx.ellipse(cx, cy, radius * 1.34, radius * 0.72, r * 0.34, 0, Math.PI * 2);
          ctx.stroke();
          for (let i = 0; i < (variantIndex === 2 ? 8 : 5); i++) {
            const idx = (r * 13 + i * 9) % n;
            const val = data[idx] / 255;
            const a   = t * (0.55 + r * 0.18) + i * Math.PI * 0.4 + r;
            const x   = cx + Math.cos(a) * radius * 1.34;
            const y   = cy + Math.sin(a) * radius * 0.72;
            ctx.globalAlpha = 0.35 + val * 0.65;
            ctx.beginPath();
            ctx.arc(x, y, 5 + val * (variantIndex === 2 ? 7 : 14), 0, Math.PI * 2);
            ctx.fill();
            if (variantIndex === 2) {
              ctx.globalAlpha = 0.18 + val * 0.25;
              ctx.beginPath();
              ctx.moveTo(x, y);
              ctx.lineTo(x - Math.cos(a) * 44, y - Math.sin(a) * 44);
              ctx.stroke();
            }
          }
        }
      } else if (style === "particles") {
        ctx.globalCompositeOperation = "lighter";
        ctx.fillStyle   = color;
        ctx.shadowBlur  = 16;
        ctx.shadowColor = color;
        sb.particles.forEach((p, i) => {
          const band  = data[i % n] / 255;
          const pulse = variantIndex === 1 ? 0.75 + mids * 1.1 : 1 + bass * 1.7 + band * 0.85;
          p.radius += p.speed * (variantIndex === 2 ? 0.9 + highs : 0.25 + bass);
          if (p.radius > W * 0.42) p.radius = 24 + (i % 12) * 2;
          const wobble = Math.sin(t * (variantIndex === 1 ? 4.8 : 1.2 + p.speed) + i) * (variantIndex === 1 ? 0.72 : 0.18);
          const x = cx + Math.cos(p.angle + wobble) * p.radius * pulse;
          const y = cy + Math.sin(p.angle + wobble) * p.radius * pulse;
          ctx.globalAlpha = Math.max(0.08, 1 - p.radius / (W * 0.45));
          ctx.beginPath();
          ctx.arc(x, y, p.size + band * (variantIndex === 2 ? 1.4 : 3.5), 0, Math.PI * 2);
          ctx.fill();
        });
      } else if (style === "glitch") {
        sb.glitch += (Math.min(1, bass * 0.8 + highs * 1.1) - sb.glitch) * 0.2;
        ctx.globalCompositeOperation = "lighter";
        ctx.fillStyle   = color;
        ctx.shadowBlur  = 12;
        ctx.shadowColor = color;
        const lines = variantIndex === 2 ? 18 : 34;
        for (let i = 0; i < lines; i++) {
          const y   = H * 0.16 + (i / lines) * H * 0.68;
          const val = data[Math.floor((i / lines) * n)] / 255;
          const shift = Math.sin(t * 9 + i * 1.7) * fieldW * (variantIndex === 1 ? 0.18 : 0.08) * sb.glitch;
          const len   = fieldW * (0.12 + val * 0.78);
          ctx.globalAlpha = 0.08 + val * 0.8;
          ctx.fillRect(x0 + shift, y, variantIndex === 2 ? len * 0.28 : len, variantIndex === 2 ? 18 + val * 24 : 4 + val * 8);
          if (val > 0.55 && variantIndex !== 2) ctx.fillRect(x0 + fieldW - len + shift * 0.5, y + 10, len * 0.42, 2);
        }
      } else if (style === "honeycomb") {
        const hexR = variantIndex === 2 ? 18 : 28;
        const dx   = hexR * 1.75;
        const dy   = hexR * 1.5;
        ctx.globalCompositeOperation = "lighter";
        ctx.strokeStyle = color;
        ctx.shadowBlur  = 10;
        ctx.shadowColor = color;
        let cell = 0;
        for (let row = 0; row < 8; row++) {
          for (let col = 0; col < 13; col++) {
            const x = x0 + col * dx + (row % 2) * dx * 0.5;
            const y = H * 0.18 + row * dy;
            if (x > x0 + fieldW || y > H * 0.88) continue;
            const rawVal = data[Math.floor((col / 13) * n)] / 255;
            sb.honeycomb[cell] += (rawVal - sb.honeycomb[cell]) * 0.18;
            const val = sb.honeycomb[cell];
            ctx.globalAlpha = 0.08 + val * 0.78;
            ctx.lineWidth   = 1 + val * 4;
            ctx.beginPath();
            for (let k = 0; k < 6; k++) {
              const a  = Math.PI / 6 + k * Math.PI / 3;
              const px = x + Math.cos(a) * hexR * (0.72 + val * 0.28);
              const py = y + Math.sin(a) * hexR * (0.72 + val * 0.28);
              if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.closePath();
            if (variantIndex === 1) { ctx.fillStyle = color; ctx.fill(); } else ctx.stroke();
            cell++;
          }
        }
      } else if (style === "level") {
        const level = Math.min(1, bass * 1.25 + mids * 0.65 + highs * 0.25);
        sb.level += (level - sb.level) * (level > sb.level ? 0.35 : 0.1);
        const meters = variantIndex === 1
          ? [{ label: "L", value: Math.min(1, bass * 0.9 + mids * 0.6) }, { label: "R", value: Math.min(1, bass * 0.75 + highs * 0.85) }]
          : [{ label: "LOW", value: bass }, { label: "MID", value: mids }, { label: "HIGH", value: highs }, { label: "RMS", value: sb.level }];
        const rowH   = variantIndex === 1 ? H * 0.2 : H * 0.13;
        const startY = variantIndex === 1 ? H * 0.38 : H * 0.26;
        ctx.font      = "700 24px JetBrains Mono, monospace";
        ctx.textBaseline = "middle";
        meters.forEach((meter, i) => {
          const y     = startY + i * rowH;
          const value = Math.min(1, meter.value);
          ctx.fillStyle = "rgba(255,255,255,0.055)";
          ctx.fillRect(x0 + 95, y - 18, fieldW - 130, 36);
